name: Deploy to Cloud Run

on:
  push:
    branches: [master]

env:
  PROJECT_ID: m7-proj
  REGION: asia-southeast1
  REPOSITORY: phone-detector-repo
  SERVICE: phone-detector-service
  IMAGE: phone-detector-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/m7-proj/phone-detector-repo/phone-detector-api:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push asia-southeast1-docker.pkg.dev/m7-proj/phone-detector-repo/phone-detector-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: phone-detector-service
          region: asia-southeast1
          image: asia-southeast1-docker.pkg.dev/m7-proj/phone-detector-repo/phone-detector-api:${{ github.sha }}